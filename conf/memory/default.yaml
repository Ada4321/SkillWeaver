use_memory: false
# Which memory library to load (CLI: memory.memory_source=general|task|both):
#   general - memory_paths (generalizable rules, no instance names)
#   task    - task_memory_paths (task-specific concrete strategies)
#   both    - union of the two (retrieval-layer relevance decides per phase)
memory_source: general
memory_paths:
  - data/memory/memory_human.json
task_memory_paths:
  - data/memory/memory_task_strategies.json
default_key: null
max_output_tokens: 4096
top_k: 2
inject:
  actor_phase_1: true
  actor_phase_2: true
  judge: true
