# libero_10 STUDY-scene preset: FIXED LIBERO agentview head camera (no pose/FoV aug).
# Inherits conf/env/default.yaml; only the fields below differ.
#
# Calibrated from the COMPILED LIBERO study arena agentview (NOT the scene XML):
#   - agentview world pose (0.4586, 0, 1.6104), optical pitch 38.9 deg, fovy 45.
#   - robot0_base at (-0.75, 0, 0.912) => agentview REL robot base (1.209, 0, 0.698).
#   - Same optical pitch as tabletop/kitchen (38.9 deg); only the robot base x
#     (-0.75 vs tabletop -0.66) shifts the camera -0.11 in x, so the look-at on the
#     table top moves to rel-rb (0.360, 0, 0.013) with the SAME radius 1.091.
#   - This repo's libero layouts are robot-base-relative (object world == LIBERO
#     rel-rb; robot base = world origin), so the camera goes at the same relative
#     pose: spherical about the table-top look-at (0.360, 0) with r/el/az below.
# Data collection is 256x256; FoV is resolution-independent so 45 deg holds at 256.

defaults:
  - default
  - _self_

init_arm_pos_files:
  - "data/init_arm_qpos_cano_aug.npz"
  - "data/init_arm_qpos_cano_all_init.npz"

# --- Head (front) camera = fixed LIBERO study agentview ---
front_camera_aug_center: [0.360, 0.0, 0.05]    # look-at xy (z comes from lookat_z; center[2] is ignored by the sampler)
front_camera_aug_radius_ranges: "1.091:1.091"
front_camera_aug_radius_mode: 1.091
front_camera_aug_azimuth_ranges_deg: "0.0:0.0"
front_camera_aug_azimuth_mode_deg: 0.0
front_camera_aug_elevation_ranges_deg: "38.9:38.9"
front_camera_aug_elevation_mode_deg: 38.9
front_camera_aug_lookat_z_ranges: null         # lock look-at to the table surface (where objects sit)
front_camera_aug_lookat_z_mode: null

# Fixed FoV = LIBERO agentview fovy 45 deg (no augmentation -> spawn aperture used verbatim).
enable_front_camera_fov_augmentation: false
front_camera:
  spawn:
    focal_length: 24.0
    horizontal_aperture: 19.882                 # 2*24*tan(22.5 deg) -> 45 deg square FoV
